# GitLab CI/CD 配置文件
# 用于自动构建和部署 React + Vite 应用到 GitLab Pages

# 定义使用的 Docker 镜像
image: node:18

# 定义缓存策略，加速后续构建
cache:
  paths:
    - node_modules/
    - .npm/

# 定义构建和部署的阶段
stages:
  - build
  - deploy

# 构建阶段
build:
  stage: build
  script:
    # 安装依赖
    - npm ci --cache .npm --prefer-offline
    # 构建项目
    - npm run build
  artifacts:
    paths:
      # 保存构建产物
      - dist/
    expire_in: 1 hour
  only:
    - master

# 部署阶段 - GitLab Pages
pages:
  stage: deploy
  script:
    # GitLab Pages 要求部署目录名为 public
    - rm -rf public
    - mv dist public
  artifacts:
    paths:
      - public
  only:
    - master
